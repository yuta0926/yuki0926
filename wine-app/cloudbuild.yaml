substitutions:
  _REGION: asia-northeast1
  _REPOSITORY: wine-app
  _BACKEND_SERVICE: wine-api
  # Vercelプロジェクト作成後、実際のProduction URLに置き換えること。
  # カスタムドメインは使わない方針のため、Vercelが発行するデフォルトドメインを想定。
  _VERCEL_FRONTEND_URL: https://wine-web.vercel.app

steps:
  # -------------------------------------
  # Backend
  # -------------------------------------
  # フロントエンドはVercelのGit連携でデプロイされるため、このパイプラインは
  # バックエンド(Cloud Run)のみを対象とする。

  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_SERVICE}:$BUILD_ID
      - ./wine-app/backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_SERVICE}:$BUILD_ID

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --project=$PROJECT_ID
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=wine-cloud-run@$PROJECT_ID.iam.gserviceaccount.com
      - --max-instances=1
      - --set-env-vars=CORS_ORIGINS=${_VERCEL_FRONTEND_URL}
      # SupabaseのPostgres接続文字列。GCP Secret Managerに事前に
      # `wine-db-url` という名前でシークレットを作成しておくこと。
      - --set-secrets=DATABASE_URL=wine-db-url:latest
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s